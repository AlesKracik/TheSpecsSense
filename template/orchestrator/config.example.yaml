# Specs Sense orchestrator config — copy to config.yaml and edit.

# Repository the orchestrator operates on (path relative to this file or absolute).
# Defaults to the project root if running from inside it.
repo_path: ..

# Claude API
llm:
  provider: anthropic
  model: claude-opus-4-7        # see shared/models.md; default to the latest Opus
  effort: high                  # low | medium | high | xhigh | max
  max_tokens: 16000             # per-call output cap; safe non-streaming default

  # Authentication / billing mode. Pick ONE.
  #
  #   api_key             — Pay-per-token via console.anthropic.com.
  #                         Reads ANTHROPIC_API_KEY from env. Full feature surface
  #                         (tool_choice, prompt caching, batch API, no rate-limit cap).
  #
  #   subscription_oauth  — Bills against your Claude Pro/Team/Max subscription.
  #                         Reads ANTHROPIC_AUTH_TOKEN (long-lived OAuth token).
  #                         Generate with `claude setup-token` after `claude login`.
  #                         Same SDK code path as api_key — only the env var differs.
  #                         Subject to subscription rate limits — see orchestrator/README.md
  #                         § Auth modes for tier guidance (Max recommended for sustained use).
  #
  #   claude_code_cli     — Invokes the `claude` CLI in headless mode via subprocess.
  #                         Inherits Claude Code's auth (subscription or API, whichever
  #                         `claude login` set up). No SDK dependency. Cannot force
  #                         structured output via tool_choice — relies on prompt
  #                         instruction; less reliable than the SDK paths.
  #
  #   augment_session     — Bills against an Augment Code subscription via session-key auth.
  #                         Invokes the `auggie` CLI; reads AUGMENT_SESSION_AUTH (the contents
  #                         of ~/.augment/session.json after `auggie login`). Same caveats as
  #                         claude_code_cli (no tool_choice forcing) PLUS no token telemetry
  #                         (Augment doesn't expose per-call usage in --print mode) and credit-
  #                         based billing (per-message, not per-token). See orchestrator/README.md
  #                         § Auth modes for the full caveat list and a ToS warning about
  #                         personal session tokens vs Service Accounts.
  auth:
    mode: api_key
    api_key_env: ANTHROPIC_API_KEY            # used when mode = api_key
    oauth_token_env: ANTHROPIC_AUTH_TOKEN     # used when mode = subscription_oauth
    cli_command: claude                        # used when mode = claude_code_cli (path to `claude` binary)
    auggie_command: auggie                     # used when mode = augment_session (path to `auggie` binary)
    augment_session_env: AUGMENT_SESSION_AUTH  # used when mode = augment_session (env var holding the session JSON)

# Github (used by pr.py via the `gh` CLI; assumes gh is installed and authenticated)
github:
  default_reviewer_team: ""             # e.g. "@your-org/spec-reviewers"
  label_prefix: "spec/"                 # PRs get labels like spec/round-1, spec/severity-high

# Polling cadence
poll:
  interval_seconds: 60          # wait between detect→dispatch loops
  max_parallel_dispatches: 3    # cap concurrent agent calls

# Observability
observability:
  log_level: INFO               # DEBUG | INFO | WARN | ERROR
  log_dir: .orchestrator/logs
  status_path: .orchestrator/status.json
  cost_path: .orchestrator/cost.json
  transcripts_dir: .orchestrator/transcripts
  transcript_retention_days: 30

# Snapshots (for the fetch-evidence skill — see template/skills/fetch-evidence.md)
snapshots:
  ttl_days: 90                  # warn when manual evidence snapshots are older
